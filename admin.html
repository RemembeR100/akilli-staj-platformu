<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Akıllı Staj Programı | Admin Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="logo.png" alt="Logo" class="logo-img">Akıllı Staj <span>Admin</span></a>
            <ul class="nav-links">
                <!-- auth.js tarafından doldurulacak -->
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <h1 class="page-title" style="text-align: left;">Admin Yönetim Paneli</h1>
        
        <div class="search-filter-section" style="justify-content: space-between; align-items: center; background: #2b2d31; padding: 20px; border-radius: 12px; box-shadow: inset 4px 4px 8px #1d1e21, inset -4px -4px 8px #393c41;">
            <p style="color: #9ca3af; font-size: 1.1rem;">Sistemdeki tüm verileri ve ilanları buradan yönetebilirsiniz.</p>
            <button id="btnDownloadSQLite" class="btn-primary" style="width: auto; margin-top: 0; background: #10b981; color: white;">Veritabanını İndir (.sqlite)</button>
        </div>

        <h2 style="margin-bottom: 20px; color: #e2e8f0; font-size: 1.5rem; margin-top: 40px;">Sistemdeki Tüm İlanlar</h2>
        
        <div id="adminIlanListesi">
            <div class="loading">İlanlar yükleniyor...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await API.waitForInit();
            const user = API.getCurrentUser();
            
            if (!user || user.rol !== 'admin') {
                alert('Bu sayfayı görüntüleme yetkiniz yok!');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('btnDownloadSQLite').addEventListener('click', () => {
                API.downloadSQLite();
            });

            loadAllJobs();
        });

        async function loadAllJobs() {
            const listContainer = document.getElementById('adminIlanListesi');
            try {
                const ilanlar = await API.getIlanlar({});
                if(ilanlar.length === 0) {
                    listContainer.innerHTML = '<p style="color: #9ca3af;">Sistemde hiç ilan bulunmuyor.</p>';
                    return;
                }

                listContainer.innerHTML = '';
                ilanlar.forEach(ilan => {
                    const card = document.createElement('div');
                    card.className = 'job-card';
                    card.innerHTML = `
                        <div class="job-info" style="flex:1;">
                            <h3>${ilan.pozisyon} <span style="font-size:0.8rem; color:#6b7280;">(ID: ${ilan.id})</span></h3>
                            <p>${ilan.sirket_adi} • ${ilan.lokasyon} (${ilan.calisma_sekli})</p>
                            <span class="job-date">Tarih: ${ilan.tarih}</span>
                        </div>
                        <button class="btn-details" style="color: #ef4444; border: 1px solid #ef4444;" onclick="ilanSil(${ilan.id})">Sil</button>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                listContainer.innerHTML = '<div class="loading">İlanlar yüklenirken hata oluştu.</div>';
            }
        }

        async function ilanSil(id) {
            if(!confirm('Bu ilanı kalıcı olarak silmek istediğinize emin misiniz? (Bağlı başvurular da silinir)')) return;
            try {
                await API.ilanSil(id);
                alert('İlan silindi.');
                loadAllJobs();
            } catch (err) {
                alert('Silme işlemi başarısız: ' + err.message);
            }
        }
    </script>
</body>
</html>
