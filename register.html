<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Staj Portal | Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="logo.png" alt="Logo" class="logo-img">Akıllı Staj Programı </a>
            <ul class="nav-links">
                <!-- auth.js tarafından doldurulacak -->
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-tabs">
                <div class="tab active" id="stajyer-tab" onclick="toggleForm('stajyer')">Stajyer</div>
                <div class="tab" id="kurumsal-tab" onclick="toggleForm('kurumsal')">Kurumsal</div>
            </div>
            
            <form id="auth-form">
                <div id="dynamic-fields">
                    <!-- Başlangıçta Stajyer Alanları -->
                    <div class="input-group">
                        <label>Ad Soyad</label>
                        <input type="text" id="regAdSoyad" placeholder="Ahmet Yılmaz" required>
                    </div>
                    <div class="input-group">
                        <label>Okul Numarası</label>
                        <input type="text" id="regOkulNo" placeholder="202401010" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>E-posta</label>
                    <input type="email" id="regEmail" placeholder="ornek@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="regPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary">Kayıt Ol</button>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Zaten üye misin? <a href="login.html" style="color: #2563EB; text-decoration: none;">Giriş Yap</a>
            </p>
        </div>
    </div>

    <script>
        function toggleForm(type) {
            const fields = document.getElementById('dynamic-fields');
            const stajyerTab = document.getElementById('stajyer-tab');
            const kurumsalTab = document.getElementById('kurumsal-tab');

            // Tab değiştirirken mevcut form hatalarını temizle
            FormValidation.clearFormErrors(document.getElementById('auth-form'));

            if (type === 'kurumsal') {
                kurumsalTab.classList.add('active');
                stajyerTab.classList.remove('active');
                fields.innerHTML = `
                    <div class="input-group">
                        <label>Firma Adı</label>
                        <input type="text" id="regFirmaAdi" placeholder="Teknoloji A.Ş." required>
                    </div>
                    <div class="input-group">
                        <label>Vergi Numarası</label>
                        <input type="text" id="regVergiNo" placeholder="1234567890" required>
                    </div>
                `;
            } else {
                stajyerTab.classList.add('active');
                kurumsalTab.classList.remove('active');
                fields.innerHTML = `
                    <div class="input-group">
                        <label>Ad Soyad</label>
                        <input type="text" id="regAdSoyad" placeholder="Ahmet Yılmaz" required>
                    </div>
                    <div class="input-group">
                        <label>Okul Numarası</label>
                        <input type="text" id="regOkulNo" placeholder="202401010" required>
                    </div>
                `;
            }
        }

        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('regEmail');
        const passwordInput = document.getElementById('regPassword');
        const dynamicFields = document.getElementById('dynamic-fields');

        // Statik inputlara yazıldıkça hataları temizle
        emailInput.addEventListener('input', () => FormValidation.clearError(emailInput));
        passwordInput.addEventListener('input', () => FormValidation.clearError(passwordInput));

        // Dinamik olarak eklenen inputlardaki hataları event delegation ile temizle
        dynamicFields.addEventListener('input', (e) => {
            if (e.target.tagName === 'INPUT') {
                FormValidation.clearError(e.target);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            FormValidation.clearFormErrors(form);

            const isKurumsal = document.getElementById('kurumsal-tab').classList.contains('active');
            
            // Dinamik alanları sorgula
            const inputs = dynamicFields.getElementsByTagName('input');
            const firstInput = inputs[0];
            const secondInput = inputs[1];

            const firstVal = firstInput ? firstInput.value.trim() : '';
            const secondVal = secondInput ? secondInput.value.trim() : '';
            const email = emailInput.value.trim();
            const sifre = passwordInput.value;
            const rol = isKurumsal ? 'kurumsal' : 'stajyer';

            let hasError = false;

            // 1. Dinamik Ad / Firma Doğrulaması
            if (!firstVal) {
                FormValidation.showError(firstInput, isKurumsal ? "Firma adı alanı boş bırakılamaz." : "Ad Soyad alanı boş bırakılamaz.");
                hasError = true;
            } else if (!isKurumsal && firstVal.split(' ').filter(Boolean).length < 2) {
                FormValidation.showError(firstInput, "Lütfen adınızı ve soyadınızı tam giriniz (en az iki kelime).");
                hasError = true;
            }

            // 2. Dinamik No / Vergi Doğrulaması
            if (!secondVal) {
                FormValidation.showError(secondInput, isKurumsal ? "Vergi numarası alanı boş bırakılamaz." : "Okul numarası alanı boş bırakılamaz.");
                hasError = true;
            } else if (isKurumsal && !/^\d{10}$/.test(secondVal)) {
                FormValidation.showError(secondInput, "Vergi numarası tam 10 haneli bir sayı olmalıdır.");
                hasError = true;
            } else if (!isKurumsal && !/^\d+$/.test(secondVal)) {
                FormValidation.showError(secondInput, "Okul numarası sadece rakamlardan oluşmalıdır.");
                hasError = true;
            }

            // 3. E-posta Format Doğrulaması
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                FormValidation.showError(emailInput, "E-posta alanı boş bırakılamaz.");
                hasError = true;
            } else if (!emailRegex.test(email)) {
                FormValidation.showError(emailInput, "Geçersiz e-posta formatı. Örn: ornek@mail.com");
                hasError = true;
            }

            // 4. Şifre Karakter Sayısı Doğrulaması (Min 6 Karakter)
            if (!sifre) {
                FormValidation.showError(passwordInput, "Şifre alanı boş bırakılamaz.");
                hasError = true;
            } else if (sifre.length < 6) {
                FormValidation.showError(passwordInput, "Güvenliğiniz için şifre en az 6 karakter olmalıdır.");
                hasError = true;
            }

            if (hasError) return;

            try {
                const btn = form.querySelector('.btn-primary');
                btn.textContent = 'Kayıt Yapılıyor...';
                btn.disabled = true;

                await API.register(firstVal, email, sifre, rol);
                showToast('Kayıt başarıyla tamamlandı! Giriş yapılıyor...', 'success', 2000);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            } catch (error) {
                showToast(error.message, 'error');
                if (error.message.includes('zaten kayıtlı') || error.message.includes('e-posta')) {
                    FormValidation.showError(emailInput, 'Bu e-posta adresi zaten kullanımda.');
                }
                const btn = form.querySelector('.btn-primary');
                btn.textContent = 'Kayıt Ol';
                btn.disabled = false;
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
</body>
</html>
