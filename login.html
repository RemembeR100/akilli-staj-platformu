<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Akıllı Staj Programı | Giriş Yap</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="logo.png" alt="Logo" class="logo-img">Akıllı Staj Programı </a>
            <ul class="nav-links">
                <!-- auth.js tarafından doldurulacak -->
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2 style="text-align: center; margin-bottom: 20px;">Giriş Yap</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>E-posta</label>
                    <input type="text" id="loginEmail" placeholder="ornek@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary">Giriş Yap</button>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Hesabın yok mu? <a href="register.html" style="color: #2563EB;">Kayıt Ol</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');

        // Input alanlarına yazıldıkça hataları temizle
        emailInput.addEventListener('input', () => FormValidation.clearError(emailInput));
        passwordInput.addEventListener('input', () => FormValidation.clearError(passwordInput));

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            FormValidation.clearFormErrors(form);

            const email = emailInput.value.trim();
            const sifre = passwordInput.value;
            let hasError = false;

            if (!email) {
                FormValidation.showError(emailInput, "E-posta alanı boş olamaz.");
                hasError = true;
            }
            if (!sifre) {
                FormValidation.showError(passwordInput, "Şifre alanı boş olamaz.");
                hasError = true;
            }

            if (hasError) return;

            try {
                const btn = form.querySelector('.btn-primary');
                btn.textContent = 'Giriş Yapılıyor...';
                btn.disabled = true;
                
                await API.login(email, sifre);
                showToast('Giriş başarılı! Yönlendiriliyorsunuz...', 'success', 2000);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            } catch (error) {
                showToast(error.message, 'error');
                if (error.message.includes('şifre') || error.message.includes('hatalı')) {
                    FormValidation.showError(passwordInput, 'E-posta veya şifre hatalı.');
                } else {
                    FormValidation.showError(emailInput, 'Kullanıcı bulunamadı.');
                }
                const btn = form.querySelector('.btn-primary');
                btn.textContent = 'Giriş Yap';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
