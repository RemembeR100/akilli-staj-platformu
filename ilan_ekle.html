<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Akıllı Staj Programı | İlan Yayınla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="logo.png" alt="Logo" class="logo-img">Akıllı Staj Programı </a>
            <ul class="nav-links">
                <!-- auth.js tarafından doldurulacak -->
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 50px;">
        <div class="profile-card" style="max-width: 800px; margin: 0 auto;">
            <h1 class="page-title" style="text-align: left; margin-bottom: 20px;">Yeni İlan Yayınla</h1>
            <p style="color: #9ca3af; margin-bottom: 30px;">Kurumsal hesabınızla yeni bir stajyer arayışınızı buradan başlatın.</p>
            
            <form id="ilanEkleForm">
                <div class="input-group">
                    <label>Pozisyon Adı</label>
                    <input type="text" id="ilanPozisyon" placeholder="Örn: Yapay Zeka Stajyeri" required>
                </div>
                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <div class="input-group" style="flex:1; min-width: 200px;">
                        <label>Lokasyon (İl Seçiniz)</label>
                        <!-- 81 il datalist ile -->
                        <input type="text" id="ilanLokasyon" list="iller" placeholder="Örn: İstanbul (Yazarak filtreleyin)" required autocomplete="off">
                        <datalist id="iller">
                            <option value="Adana"><option value="Adıyaman"><option value="Afyonkarahisar"><option value="Ağrı"><option value="Amasya"><option value="Ankara"><option value="Antalya"><option value="Artvin"><option value="Aydın"><option value="Balıkesir"><option value="Bilecik"><option value="Bingöl"><option value="Bitlis"><option value="Bolu"><option value="Burdur"><option value="Bursa"><option value="Çanakkale"><option value="Çankırı"><option value="Çorum"><option value="Denizli"><option value="Diyarbakır"><option value="Edirne"><option value="Elazığ"><option value="Erzincan"><option value="Erzurum"><option value="Eskişehir"><option value="Gaziantep"><option value="Giresun"><option value="Gümüşhane"><option value="Hakkari"><option value="Hatay"><option value="Isparta"><option value="Mersin"><option value="İstanbul"><option value="İzmir"><option value="Kars"><option value="Kastamonu"><option value="Kayseri"><option value="Kırklareli"><option value="Kırşehir"><option value="Kocaeli"><option value="Konya"><option value="Kütahya"><option value="Malatya"><option value="Manisa"><option value="Kahramanmaraş"><option value="Mardin"><option value="Muğla"><option value="Muş"><option value="Nevşehir"><option value="Niğde"><option value="Ordu"><option value="Rize"><option value="Sakarya"><option value="Samsun"><option value="Siirt"><option value="Sinop"><option value="Sivas"><option value="Tekirdağ"><option value="Tokat"><option value="Trabzon"><option value="Tunceli"><option value="Şanlıurfa"><option value="Uşak"><option value="Van"><option value="Yozgat"><option value="Zonguldak"><option value="Aksaray"><option value="Bayburt"><option value="Karaman"><option value="Kırıkkale"><option value="Batman"><option value="Şırnak"><option value="Bartın"><option value="Ardahan"><option value="Iğdır"><option value="Yalova"><option value="Karabük"><option value="Kilis"><option value="Osmaniye"><option value="Düzce">
                        </datalist>
                    </div>
                    <div class="input-group" style="flex:1; min-width: 200px;">
                        <label>Çalışma Şekli</label>
                        <select id="ilanCalisma" class="filter-select" required>
                            <option value="Ofis">Ofis</option>
                            <option value="Uzaktan">Uzaktan</option>
                            <option value="Hibrit">Hibrit</option>
                            <option value="Tam Zamanlı Staj">Tam Zamanlı Staj</option>
                            <option value="Yarı Zamanlı Staj">Yarı Zamanlı Staj</option>
                            <option value="Gönüllü Staj">Gönüllü Staj</option>
                            <option value="Proje Bazlı">Proje Bazlı</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex:1; min-width: 200px;">
                        <label>Kategori</label>
                        <select id="ilanKategori" class="filter-select" required>
                            <option value="Yazılım">Yazılım Geliştirme</option>
                            <option value="Web">Web Tasarım/Geliştirme</option>
                            <option value="Veri">Veri Bilimi / Veri Analitiği</option>
                            <option value="Pazarlama">Pazarlama / SEO</option>
                            <option value="Siber Güvenlik">Siber Güvenlik</option>
                            <option value="Yapay Zeka">Yapay Zeka / Makine Öğrenmesi</option>
                            <option value="Mobil">Mobil Geliştirme (iOS/Android)</option>
                            <option value="DevOps">DevOps / Bulut Sistemler</option>
                            <option value="IK">İnsan Kaynakları (İK)</option>
                            <option value="Finans">Finans / Muhasebe</option>
                            <option value="Tasarım">Tasarım (UI/UX - 3D - Grafik)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Aranan Yetenekler (Virgülle veya Enter ile ayırın)</label>
                    <div class="skill-tags-box" id="jobSkillsBox" onclick="document.getElementById('jobSkillInput').focus()">
                        <div id="jobSkillsContainer" style="display:flex; flex-wrap:wrap; gap:7px;"></div>
                        <input type="text" id="jobSkillInput" class="stag-input" placeholder="Örn: SQL, React...">
                    </div>
                    <small style="color:var(--text-secondary); margin-top:5px; display:block;">Stajyerin bu ilana ne kadar uyduğunu hesaplamak için buraya yazdığınız yetenekler kullanılacaktır.</small>
                </div>
                <div class="input-group">
                    <label>Detaylar / İş Tanımı</label>
                    <textarea id="ilanDetay" rows="5" style="width: 100%; padding: 14px; border: none; border-radius: 8px; outline: none; background: #2b2d31; color: #fff; box-shadow: inset 4px 4px 8px #1d1e21, inset -4px -4px 8px #393c41; font-size: 1rem; resize: vertical;" required placeholder="Adaydan beklenen yetenekler ve iş tanımını detaylıca yazınız..."></textarea>
                </div>
                <button type="submit" class="btn-primary">İlanı Yayınla</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await API.waitForInit();
            const user = await API.getCurrentUser();
            if (!user || user.rol !== 'kurumsal') {
                showToast('Bu sayfayı görüntülemek için kurumsal üye girişi yapmalısınız!', 'warning', 3000);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            const form = document.getElementById('ilanEkleForm');
            const pozInput = document.getElementById('ilanPozisyon');
            const lokInput = document.getElementById('ilanLokasyon');
            const calInput = document.getElementById('ilanCalisma');
            const katInput = document.getElementById('ilanKategori');
            const detInput = document.getElementById('ilanDetay');
            
            // Skill logic
            let jobSkills = [];
            const jobSkillInput = document.getElementById('jobSkillInput');
            const jobSkillsContainer = document.getElementById('jobSkillsContainer');

            function renderJobTags() {
                jobSkillsContainer.innerHTML = '';
                jobSkills.forEach(s => {
                    const d = document.createElement('div'); d.className = 'stag';
                    d.innerHTML = `<span>${s}</span><span class="x" onclick="removeJobSkill('${s}')">×</span>`;
                    jobSkillsContainer.appendChild(d);
                });
            }

            window.removeJobSkill = function(val) {
                jobSkills = jobSkills.filter(s => s !== val);
                renderJobTags();
            };

            function addJobSkillTag(val) {
                val = val.trim();
                if (!val || jobSkills.includes(val)) return;
                jobSkills.push(val);
                renderJobTags();
            }

            jobSkillInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    addJobSkillTag(e.target.value);
                    e.target.value = '';
                }
            });
            jobSkillInput.addEventListener('blur', e => {
                addJobSkillTag(e.target.value);
                e.target.value = '';
            });

            // Yazıldıkça hataları temizle
            pozInput.addEventListener('input', () => FormValidation.clearError(pozInput));
            lokInput.addEventListener('input', () => FormValidation.clearError(lokInput));
            detInput.addEventListener('input', () => FormValidation.clearError(detInput));

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                FormValidation.clearFormErrors(form);

                const poz = pozInput.value.trim();
                const lok = lokInput.value.trim();
                const cal = calInput.value;
                const kat = katInput.value;
                const det = detInput.value.trim();
                const arananYetenekler = jobSkills.join(', ');

                let hasError = false;

                if (!poz) {
                    FormValidation.showError(pozInput, "Pozisyon adı alanı boş bırakılamaz.");
                    hasError = true;
                } else if (poz.length < 5) {
                    FormValidation.showError(pozInput, "Pozisyon adı en az 5 karakter olmalıdır.");
                    hasError = true;
                }

                if (!lok) {
                    FormValidation.showError(lokInput, "Lütfen bir lokasyon/il seçiniz.");
                    hasError = true;
                }

                if (!det) {
                    FormValidation.showError(detInput, "İş tanımı alanı boş bırakılamaz.");
                    hasError = true;
                } else if (det.length < 20) {
                    FormValidation.showError(detInput, "Lütfen en az 20 karakterlik açıklayıcı bir iş tanımı yazınız.");
                    hasError = true;
                }

                if (hasError) return;

                try {
                    const btn = form.querySelector('.btn-primary');
                    btn.textContent = 'Yayınlanıyor...';
                    btn.disabled = true;
                    
                    await API.ilanEkle(user.ad, poz, lok, cal, kat, det, arananYetenekler);
                    showToast('İlanınız başarıyla yayınlandı!', 'success', 2000);
                    form.reset();
                    setTimeout(() => {
                        window.location.href = 'index.html'; // Anasayfaya dön
                    }, 1200);
                } catch (err) {
                    showToast('Hata: ' + err.message, 'error');
                    const btn = form.querySelector('.btn-primary');
                    btn.textContent = 'İlanı Yayınla';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
